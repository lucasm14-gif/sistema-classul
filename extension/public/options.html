<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Classul · Opções</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 32px;
      width: 100%;
      max-width: 440px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; color: #0f172a; }
    p.sub { font-size: 13px; color: #64748b; margin: 0 0 24px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      margin: 16px 0 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #10b981; }
    button {
      margin-top: 24px;
      width: 100%;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #1e293b; }
    #status { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
    #status.ok { color: #059669; }
    #status.err { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Classul · Configuração</h1>
    <p class="sub">Conecte a extensão ao seu sistema de pedidos.</p>

    <label for="apiUrl">URL do sistema</label>
    <input id="apiUrl" type="url" placeholder="https://pedidos.classul.com.br" />

    <label for="apiToken">Senha de acesso (API_TOKEN)</label>
    <input id="apiToken" type="password" placeholder="A mesma senha usada para entrar no sistema" />

    <button id="save">Salvar e testar conexão</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
