    <rect x="31" y="44" width="312" height="166" rx="6" fill="#f8f6f1" stroke="#b5b5b5" stroke-width="3"/>
    <rect x="44" y="57" width="286" height="140" fill="none" stroke="#3d3d3d" stroke-width="2"/>
    <text x="187" y="102" text-anchor="middle" font-size="26" font-family="Georgia, serif" font-weight="700" fill="#333333">POLICIA CIVIL</text>
